api:
  listen: ":1984"
  origin: "*"

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"
  # When running go2rtc in Docker, explicitly publish host-reachable candidates.
  # For local dev on the same machine, 127.0.0.1 is usually sufficient.
  candidates:
    - "127.0.0.1:8555"
  ice_servers:
    - urls: ["stun:stun.l.google.com:19302"]
    # Optional TURN server for remote WebRTC connectivity.
    # go2rtc supports environment variable expansion via `${VAR}` syntax.
    - urls: ["${TURN_SERVER_URL:turn:localhost:3478}"]
      username: "${TURN_SERVER_USERNAME:osp}"
      credential: "${TURN_SERVER_CREDENTIAL:osp}"

log:
  level: info

streams:
  55f488ac-27c1-4090-a105-2debbbec231a:
    - rtsp://192.168.4.64:8554/stream
