services:
  # ─── Data Layer ───
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Video Infrastructure ───
  go2rtc:
    image: alexxit/go2rtc:latest
    ports:
      - "1984:1984"   # API
      - "8554:8554"   # RTSP
      - "8555:8555"   # WebRTC
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml
    restart: unless-stopped

  # ─── API Gateway ───
  gateway:
    build:
      context: ../../
      dockerfile: infra/docker/gateway.Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - GO2RTC_API_URL=http://go2rtc:1984
    restart: unless-stopped

  # ─── Go Services ───
  camera-ingest:
    build:
      context: ../../services/camera-ingest
      dockerfile: ../../infra/docker/go-service.Dockerfile
      args:
        SERVICE_NAME: camera-ingest
    ports:
      - "50051:50051"
    environment:
      - INGEST_GRPC_PORT=50051
      - GO2RTC_API_URL=http://go2rtc:1984
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - go2rtc
    restart: unless-stopped

  video-pipeline:
    build:
      context: ../../services/video-pipeline
      dockerfile: ../../infra/docker/go-service.Dockerfile
      args:
        SERVICE_NAME: video-pipeline
    ports:
      - "50052:50052"
    env_file:
      - ../../.env
    environment:
      - VIDEO_GRPC_PORT=50052
      - GO2RTC_API_URL=http://go2rtc:1984
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - go2rtc
    restart: unless-stopped

  event-engine:
    build:
      context: ../../services/event-engine
      dockerfile: ../../infra/docker/go-service.Dockerfile
      args:
        SERVICE_NAME: event-engine
    ports:
      - "50053:50053"
    env_file:
      - ../../.env
    environment:
      - EVENT_GRPC_PORT=50053
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  extension-runtime:
    build:
      context: ../../services/extension-runtime
      dockerfile: ../../infra/docker/go-service.Dockerfile
      args:
        SERVICE_NAME: extension-runtime
    ports:
      - "50054:50054"
    env_file:
      - ../../.env
    environment:
      - EXTENSION_GRPC_PORT=50054
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
