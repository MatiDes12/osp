# ─────────────────────────────────────────────────────────────────────────────
# OSP Agent — runs on the client's local network
#
# This is all a client needs to install on their NAS/server/PC.
# It connects to the OSP cloud gateway for auth, rules, and data.
# go2rtc handles all local camera streams (RTSP/ONVIF/USB).
# ngrok creates a secure public tunnel so live streams work from
# anywhere — no port forwarding or network config required.
# ngrok supports WebSocket which is required for live video streaming.
#
# Setup:
#   1. Create infra/docker/.env.agent (see .env.agent.example) and fill in your values
#   2. Linux / NAS: docker compose --env-file .env.agent -f docker-compose.agent.yml up -d
#   3. Docker Desktop (Windows/Mac): use docker-compose.agent.win.yml instead of this file
#      (host networking does not publish :1984 to your PC). Then http://localhost:1984/ works.
#   Production / CI: inject CLOUD_*, TENANT_ID, NGROK_AUTHTOKEN, TZ (etc.) in the environment
#   or use `docker compose --env-file /run/secrets/agent.env ...` — same variable names as below.
#
# Requirements: Docker + Docker Compose
#
# Production clients (no repo clone): see edge/README.md in this folder.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── go2rtc: camera stream proxy ──────────────────────────────────────────
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: osp-go2rtc
    network_mode: host          # Required for ONVIF/mDNS camera discovery
    restart: unless-stopped
    volumes:
      - ./go2rtc.agent.yaml:/config/go2rtc.yaml:ro
      - go2rtc-data:/data
    environment:
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1984/api/streams"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── ngrok Tunnel: exposes go2rtc publicly so live streams work from
  #    the cloud dashboard without any port forwarding or static IP.
  #    Supports WebSocket (required for MSE live streaming).
  #    The edge agent auto-discovers the tunnel URL from ngrok's local API.
  # NGROK_AUTHTOKEN required (verified ngrok account). Missing → ERR_NGROK_4018, cloud snapshots 502.
  ngrok:
    image: ngrok/ngrok:latest
    container_name: osp-ngrok
    network_mode: host
    restart: unless-stopped
    command: http http://localhost:1984 --log stdout
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      go2rtc:
        condition: service_healthy

  # ── OSP Agent: registers cameras with cloud gateway ──────────────────────
  osp-agent:
    image: ${OSP_EDGE_AGENT_IMAGE:-ghcr.io/matides12/osp-edge-agent:latest}
    container_name: osp-agent
    network_mode: host
    restart: unless-stopped
    depends_on:
      go2rtc:
        condition: service_healthy
      ngrok:
        condition: service_started
    environment:
      - CLOUD_GATEWAY_URL=${CLOUD_GATEWAY_URL:-https://osp-gateway.fly.dev}
      - TENANT_ID=${TENANT_ID}
      - CLOUD_API_TOKEN=${CLOUD_API_TOKEN}
      - GO2RTC_URL=http://localhost:1984
      - NGROK_API_URL=http://localhost:4040
      - TZ=${TZ:-UTC}

volumes:
  go2rtc-data:
