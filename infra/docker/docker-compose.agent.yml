# ─────────────────────────────────────────────────────────────────────────────
# OSP Agent — runs on the client's local network
#
# This is all a client needs to install on their NAS/server/PC.
# It connects to the OSP cloud gateway for auth, rules, and data.
# go2rtc handles all local camera streams (RTSP/ONVIF/USB).
# cloudflared creates a secure public tunnel so live streams work from
# anywhere — no port forwarding or network config required.
#
# Setup:
#   1. Copy .env.agent.example to .env.agent and fill in your values
#   2. docker compose -f docker-compose.agent.yml up -d
#
# Requirements: Docker + Docker Compose
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── go2rtc: camera stream proxy ──────────────────────────────────────────
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: osp-go2rtc
    network_mode: host          # Required for ONVIF/mDNS camera discovery
    restart: unless-stopped
    volumes:
      - ./go2rtc.agent.yaml:/config/go2rtc.yaml:ro
      - go2rtc-data:/data
    environment:
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1984/api/streams"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Cloudflare Tunnel: exposes go2rtc publicly so live streams work from
  #    the cloud dashboard without any port forwarding or static IP.
  #    The edge agent auto-discovers the tunnel URL from cloudflared's API.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: osp-cloudflared
    network_mode: host
    restart: unless-stopped
    command: tunnel --url http://localhost:1984 --metrics 0.0.0.0:20241 --no-autoupdate
    depends_on:
      go2rtc:
        condition: service_healthy

  # ── OSP Agent: registers cameras with cloud gateway ──────────────────────
  osp-agent:
    image: ghcr.io/matides12/osp-edge-agent:latest
    container_name: osp-agent
    network_mode: host
    restart: unless-stopped
    depends_on:
      go2rtc:
        condition: service_healthy
      cloudflared:
        condition: service_started
    environment:
      - GATEWAY_URL=${GATEWAY_URL:-https://osp-gateway.fly.dev}
      - TENANT_ID=${TENANT_ID}
      - API_TOKEN=${API_TOKEN}
      - GO2RTC_URL=http://localhost:1984
      # Auto-discovered from cloudflared — no need to set manually
      - CLOUDFLARED_METRICS_URL=http://localhost:20241
      - TZ=${TZ:-UTC}

volumes:
  go2rtc-data:
