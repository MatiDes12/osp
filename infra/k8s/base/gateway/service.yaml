apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: osp
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: osp
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
