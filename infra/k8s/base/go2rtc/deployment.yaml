apiVersion: apps/v1
kind: Deployment
metadata:
  name: go2rtc
  namespace: osp
  labels:
    app.kubernetes.io/name: go2rtc
    app.kubernetes.io/part-of: osp
    app.kubernetes.io/component: streaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: go2rtc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: go2rtc
        app.kubernetes.io/part-of: osp
        app.kubernetes.io/component: streaming
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: go2rtc
          image: alexxit/go2rtc:latest
          ports:
            - name: api
              containerPort: 1984
              protocol: TCP
            - name: rtsp
              containerPort: 8554
              protocol: TCP
            - name: webrtc
              containerPort: 8555
              protocol: TCP
            - name: webrtc-udp
              containerPort: 8555
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /config/go2rtc.yaml
              subPath: go2rtc.yaml
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api
              port: api
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: go2rtc-config
