apiVersion: v1
kind: Service
metadata:
  name: go2rtc
  namespace: osp
  labels:
    app.kubernetes.io/name: go2rtc
    app.kubernetes.io/part-of: osp
    app.kubernetes.io/component: streaming
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: go2rtc
  ports:
    - name: api
      port: 1984
      targetPort: api
      protocol: TCP
    - name: rtsp
      port: 8554
      targetPort: rtsp
      protocol: TCP
    - name: webrtc
      port: 8555
      targetPort: webrtc
      protocol: TCP
