app = "osp-gateway"
primary_region = "iad"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[services]]
  internal_port = 3002
  protocol = "tcp"

  [[services.ports]]
    port = 3002
    handlers = ["tls", "http"]

  [[services.tcp_checks]]
    grace_period = "10s"
    interval = "15s"
    timeout = "5s"

[env]
  NODE_ENV = "production"
  GATEWAY_PORT = "3000"
  WS_PORT = "3002"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
