app = "osp-gateway"
primary_region = "iad"

[build]
  dockerfile = "../../infra/docker/gateway.Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[env]
  NODE_ENV = "production"
  GATEWAY_PORT = "3000"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
