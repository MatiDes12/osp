app = "osp-video-pipeline"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 40

[[http_service.checks]]
  grace_period = "15s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[env]
  GRPC_PORT = "8081"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2048mb"
  cpus = 2
