app = "osp-edge-agent"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8084
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 40

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[env]
  EDGE_HTTP_PORT = "8084"
  DATA_DIR       = "/data"

[[mounts]]
  source      = "edge_data"
  destination = "/data"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
