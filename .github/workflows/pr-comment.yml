name: PR Summary

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  comment:
    name: Post PR Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather PR stats
        id: stats
        run: |
          # Files changed
          FILES=$(git diff --name-only origin/main...HEAD | wc -l)
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

          # Lines changed
          LINES=$(git diff --stat origin/main...HEAD | tail -1)
          echo "lines=$LINES" >> "$GITHUB_OUTPUT"

          # Migrations changed
          MIGRATIONS=$(git diff --name-only origin/main...HEAD | grep 'supabase/migrations' | wc -l)
          echo "migrations=$MIGRATIONS" >> "$GITHUB_OUTPUT"

          # Workflow changes
          WORKFLOWS=$(git diff --name-only origin/main...HEAD | grep '.github/workflows' | wc -l)
          echo "workflows=$WORKFLOWS" >> "$GITHUB_OUTPUT"

          # List changed packages
          PKGS=$(git diff --name-only origin/main...HEAD \
            | grep -oE '^(apps|packages|services)/[^/]+' \
            | sort -u | tr '\n' ' ')
          echo "packages=$PKGS" >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const files    = '${{ steps.stats.outputs.files }}';
            const lines    = `${{ steps.stats.outputs.lines }}`;
            const migs     = '${{ steps.stats.outputs.migrations }}';
            const pkgs     = '${{ steps.stats.outputs.packages }}';
            const wfs      = '${{ steps.stats.outputs.workflows }}';
            const sha      = context.sha.slice(0, 7);
            const branch   = context.payload.pull_request.head.ref;
            const ciUrl    = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs`;

            const migWarn  = migs > 0
              ? `\n> ⚠️ **${migs} migration(s) changed** — run \`00023_fix_rls_policies.sql\` in Supabase SQL editor after merging.`
              : '';
            const wfWarn   = wfs > 0
              ? `\n> 🔄 **${wfs} workflow(s) changed** — verify CI behaviour after merge.`
              : '';

            const body = `## 🚀 PR Summary — \`${branch}\` @ \`${sha}\`

            | Item | Value |
            |------|-------|
            | 📁 Files changed | ${files} |
            | 📦 Packages touched | \`${pkgs || 'none'}\` |
            | 🗄️ DB migrations | ${migs > 0 ? `**${migs} (run manually)**` : '0'} |
            | ⚙️ Workflows changed | ${wfs} |
            ${migWarn}${wfWarn}

            ### Checks

            | Check | Status |
            |-------|--------|
            | Format (Prettier) | [View](${ ciUrl }) |
            | Lint & Type Check | [View](${ ciUrl }) |
            | Security Audit | [View](${ ciUrl }) |
            | Unit Tests | [View](${ ciUrl }) |
            | Build | [View](${ ciUrl }) |
            | Go Lint & Tests | [View](${ ciUrl }) |
            | E2E (Playwright) | [View](${ ciUrl }) |

            ### Security checklist
            - [ ] No hardcoded secrets
            - [ ] RLS policies on any new tables
            - [ ] Input validation on new endpoints
            - [ ] Signed URLs for video/media streams

            ---
            <sub>Auto-generated by OSP CI · ${new Date().toUTCString()}</sub>`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('PR Summary')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
