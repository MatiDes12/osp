name: Lighthouse CI

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/shared/**"

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }

      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }

      - run: pnpm install --frozen-lockfile

      - name: Build @osp/shared
        run: pnpm --filter @osp/shared build

      - name: Build @osp/ui
        run: pnpm --filter @osp/ui build

      - name: Build web app
        run: pnpm --filter @osp/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Start web app (production mode)
        run: |
          pnpm --filter @osp/web start &
          sleep 5
          curl -sf http://localhost:3001 || (echo "Server failed to start" && exit 1)
        env:
          PORT: 3001

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:3001
            http://localhost:3001/login
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
