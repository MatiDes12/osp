name: Desktop Release

# Builds native installers for Windows, macOS, and Linux.
# Triggered automatically on version tags (v*) or manually via workflow_dispatch.
# Artifacts are uploaded to the GitHub Release for the given tag.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish under (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false   # don't cancel other platforms if one fails
      matrix:
        include:
          # ── Windows x86_64 ──────────────────────────────────────────────────
          - platform: windows-x86_64
            os: windows-latest
            go2rtc_asset: go2rtc_win64.exe
            go2rtc_bin: go2rtc-x86_64-pc-windows-msvc.exe
            ingest_goos: windows
            ingest_goarch: amd64
            ingest_bin: camera-ingest-x86_64-pc-windows-msvc.exe

          # ── macOS Apple Silicon ─────────────────────────────────────────────
          - platform: macos-aarch64
            os: macos-latest
            go2rtc_asset: go2rtc_mac_arm64
            go2rtc_bin: go2rtc-aarch64-apple-darwin
            ingest_goos: darwin
            ingest_goarch: arm64
            ingest_bin: camera-ingest-aarch64-apple-darwin

          # ── macOS Intel ─────────────────────────────────────────────────────
          - platform: macos-x86_64
            os: macos-13
            go2rtc_asset: go2rtc_mac_amd64
            go2rtc_bin: go2rtc-x86_64-apple-darwin
            ingest_goos: darwin
            ingest_goarch: amd64
            ingest_bin: camera-ingest-x86_64-apple-darwin

          # ── Linux x86_64 ────────────────────────────────────────────────────
          - platform: linux-x86_64
            os: ubuntu-22.04
            go2rtc_asset: go2rtc_linux_amd64
            go2rtc_bin: go2rtc-x86_64-unknown-linux-gnu
            ingest_goos: linux
            ingest_goarch: amd64
            ingest_bin: camera-ingest-x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Linux: WebKit + system tray dependencies ─────────────────────────────
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Node + pnpm ──────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Rust ─────────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      # ── go2rtc sidecar binary ─────────────────────────────────────────────────
      - name: Download go2rtc sidecar
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          curl -fsSL \
            "https://github.com/AlexxIT/go2rtc/releases/latest/download/${{ matrix.go2rtc_asset }}" \
            -o "apps/desktop/src-tauri/binaries/${{ matrix.go2rtc_bin }}"
          chmod +x "apps/desktop/src-tauri/binaries/${{ matrix.go2rtc_bin }}" || true

      # ── camera-ingest sidecar binary ──────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/camera-ingest/go.sum

      - name: Build camera-ingest sidecar
        shell: bash
        run: |
          cd services/camera-ingest
          GOOS=${{ matrix.ingest_goos }} GOARCH=${{ matrix.ingest_goarch }} CGO_ENABLED=0 \
            go build -ldflags="-s -w" -o \
            "../../apps/desktop/src-tauri/binaries/${{ matrix.ingest_bin }}" \
            ./cmd
          chmod +x "../../apps/desktop/src-tauri/binaries/${{ matrix.ingest_bin }}" || true

      # ── Build + publish ───────────────────────────────────────────────────────
      # tauri-action builds the installer and uploads it to the GitHub Release.
      # If the release doesn't exist yet it creates it; if it does it appends.
      - name: Build and publish Tauri installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional code-signing secrets — build succeeds without them,
          # but Windows will show a SmartScreen warning and macOS will
          # require "Allow anyway" in System Settings.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS notarisation (optional)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          releaseName: "OSP ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}"
          releaseBody: |
            ## OSP Desktop App

            Download the installer for your platform from the assets below.

            | Platform | Installer |
            |----------|-----------|
            | **Windows** | `OSP_*_x64-setup.exe` (NSIS, recommended) or `OSP_*_x64_en-US.msi` |
            | **macOS — Apple Silicon** | `OSP_*_aarch64.dmg` |
            | **macOS — Intel** | `OSP_*_x64.dmg` |
            | **Linux** | `OSP_*_amd64.AppImage` (portable) or `OSP_*_amd64.deb` |

            > **Unsigned installers:** Windows will show a SmartScreen warning — click **More info → Run anyway**.
            > macOS will show a Gatekeeper warning — open **System Settings → Privacy & Security → Open Anyway**.
            > To remove these warnings, add the secrets `TAURI_SIGNING_PRIVATE_KEY`, `APPLE_CERTIFICATE`, etc. to your repo.

            ## What's included
            - go2rtc v1.9.9 (bundled — no separate install needed)
            - System tray with live camera/alert counts
            - Native OS notifications for motion events
            - Auto-start on login (optional)
            - Direct local connection to go2rtc — no cloud hop, <100 ms latency
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          includeUpdaterJson: false
