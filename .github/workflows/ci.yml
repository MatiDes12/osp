name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  # ─── Lint & Type Check ──────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build @osp/shared
        run: pnpm --filter @osp/shared build

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

  # ─── Test Shared Package ────────────────────────────
  test-shared:
    name: Test (@osp/shared)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build @osp/shared
        run: pnpm --filter @osp/shared build

      - name: Test @osp/shared
        run: pnpm --filter @osp/shared test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shared
          path: packages/shared/coverage/
          retention-days: 7

  # ─── Test Gateway ───────────────────────────────────
  test-gateway:
    name: Test (@osp/gateway)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build @osp/shared
        run: pnpm --filter @osp/shared build

      - name: Test @osp/gateway
        run: pnpm --filter @osp/gateway test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-gateway
          path: services/gateway/coverage/
          retention-days: 7

  # ─── Build Web App ─────────────────────────────────
  build-web:
    name: Build (@osp/web)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build @osp/shared
        run: pnpm --filter @osp/shared build

      - name: Build @osp/web
        run: pnpm --filter @osp/web build

      - name: Cache .next directory
        uses: actions/cache@v4
        with:
          path: apps/web/.next
          key: next-build-${{ github.sha }}
          restore-keys: |
            next-build-

  # ─── Build Extension SDK ───────────────────────────
  build-sdk:
    name: Build (@osp/extension-sdk)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build @osp/extension-sdk
        run: pnpm --filter @osp/extension-sdk build
