<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Shield gradient: rich blue top → deep navy bottom -->
    <linearGradient id="shield" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <!-- Shield inner panel (darker inset) -->
    <linearGradient id="panel" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <!-- Iris gradient -->
    <radialGradient id="iris" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#93c5fd"/>
      <stop offset="45%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <!-- Subtle glow behind eye -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip path for the eye almond inside the shield -->
    <clipPath id="eyeclip">
      <ellipse cx="50" cy="56" rx="22" ry="13"/>
    </clipPath>
  </defs>

  <!-- ── Outer shield shape ── -->
  <path
    d="M50 4 L88 20 L88 54 Q88 78 50 96 Q12 78 12 54 L12 20 Z"
    fill="url(#shield)"
  />

  <!-- ── Inner shield panel (recessed area) ── -->
  <path
    d="M50 11 L81 25 L81 54 Q81 74 50 89 Q19 74 19 54 L19 25 Z"
    fill="url(#panel)"
  />

  <!-- ── Glow halo behind eye ── -->
  <ellipse cx="50" cy="56" rx="28" ry="18" fill="url(#glow)"/>

  <!-- ── Eye sclera (white of eye) ── -->
  <ellipse cx="50" cy="56" rx="22" ry="13" fill="#e0f2fe" opacity="0.97"/>

  <!-- ── Iris ── -->
  <circle cx="50" cy="56" r="9.5" fill="url(#iris)"/>

  <!-- ── Pupil ── -->
  <circle cx="50" cy="56" r="4.8" fill="#020617"/>

  <!-- ── Specular highlight ── -->
  <circle cx="53.5" cy="52.5" r="2.4" fill="white" opacity="0.75"/>
  <circle cx="46.5" cy="59"   r="1.1" fill="white" opacity="0.3"/>

  <!-- ── Upper eyelid shadow (gives the peeking look) ── -->
  <path
    d="M28 43 Q50 62 72 43"
    fill="none"
    stroke="#0f172a"
    stroke-width="3.5"
    stroke-linecap="round"
    opacity="0.5"
  />

  <!-- ── Shield top rim highlight (glass effect) ── -->
  <path
    d="M33 21 Q50 16 67 21"
    fill="none"
    stroke="white"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.18"
  />
</svg>
