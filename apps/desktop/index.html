<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OSP — Connect to Server</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="12" fill="#3b82f6"/>
          <circle cx="24" cy="22" r="8" stroke="white" stroke-width="2.5" fill="none"/>
          <circle cx="24" cy="22" r="3" fill="white"/>
          <path d="M16 34 Q24 28 32 34" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>
        <span class="logo-text">OSP</span>
      </div>

      <h1>Open Surveillance Platform</h1>
      <p class="subtitle">Connect to your OSP server to get started.</p>

      <form id="connect-form">
        <label for="server-url">Server URL</label>
        <input
          type="url"
          id="server-url"
          placeholder="http://localhost:3001"
          autocomplete="url"
          spellcheck="false"
        />
        <p class="hint">
          Enter the URL of your OSP web dashboard.<br />
          Use <code>http://localhost:3001</code> for a local server.
        </p>
        <button type="submit" id="connect-btn">Connect</button>
      </form>

      <div id="error-msg" class="error hidden"></div>

      <p class="recent-label" id="recent-label" style="display:none">Recent connections</p>
      <ul id="recent-list" class="recent-list"></ul>
    </div>

    <script type="module" src="src/connect.js"></script>
  </body>
</html>
